name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - work

jobs:
  gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run quality gate
        run: bash scripts/quality_gate.sh
